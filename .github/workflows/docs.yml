name: Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          # dmipy itself is needed only for cross-references; data extras keep
          # the bundled-slice loaders importable. Notebook execution is OFF in
          # _config.yml (committed outputs), so no GPU is required here.
          # dmipy-sim is a hard dependency; install from the public repo until it is on PyPI.
          pip install "dmipy-sim @ git+https://github.com/dmrai-lab/dmipy-sim.git"
          pip install -e ".[data]"

      - name: Build the book
        run: jupyter-book build . --path-output _build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
