name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get install -y graphviz

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov nbmake jupytext
          # dmipy-sim is a hard dependency; until it is on PyPI, install it from the
          # (public) GitHub repo so the versioned `dmipy-sim>=2.0` requirement resolves.
          pip install "dmipy-sim @ git+https://github.com/dmrai-lab/dmipy-sim.git"
          pip install -e ".[jax,all]"

      - name: Run tests
        run: |
          pytest dmipy_fit/ -q --tb=short -m "not slow"

      - name: Execute lightweight tutorial notebooks (honesty check)
        if: matrix.python-version == '3.12'
        run: |
          # Executes the flagship canonical-WM parity page on CPU: the analytical
          # forward runs live and is asserted against the cached, step-resolved
          # Monte-Carlo reference (flagship_mc_reference.npz), so CPU CI stays fast.
          JAX_PLATFORMS=cpu pytest --nbmake -q \
            examples/flagship_canonical_wm/canonical_wm_parity.md \
            examples/01_acquisition_schemes/waveform_first_acquisition_scheme.md \
            examples/01_acquisition_schemes/loading_schemes_from_files_and_dipy.md

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
